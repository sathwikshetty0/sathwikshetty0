<svg width="860" height="360" viewBox="0 0 860 360" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <defs>
    <style>
      /* ── Scanline sweep ── */
      .scanline { animation: scan 4s linear infinite; }
      @keyframes scan {
        0%   { transform: translateY(-10px); opacity: 0; }
        5%   { opacity: 0.07; }
        95%  { opacity: 0.05; }
        100% { transform: translateY(370px); opacity: 0; }
      }

      /* ── Cursor blink ── */
      .blink { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      /* ── Row fade-in ── */
      .row { opacity: 0; animation: fadein 0.5s ease forwards; }
      .row:nth-child(1) { animation-delay: 0.3s; }
      .row:nth-child(2) { animation-delay: 0.6s; }
      .row:nth-child(3) { animation-delay: 0.9s; }
      .row:nth-child(4) { animation-delay: 1.2s; }
      .row:nth-child(5) { animation-delay: 1.5s; }
      .row:nth-child(6) { animation-delay: 1.8s; }
      .row:nth-child(7) { animation-delay: 2.1s; }
      .row:nth-child(8) { animation-delay: 2.4s; }
      @keyframes fadein {
        from { opacity:0; transform:translateX(-8px); }
        to   { opacity:1; transform:translateX(0); }
      }

      /* ── Status bar pulse ── */
      .pulse-bar { animation: pulsebar 2.2s ease-in-out infinite; }
      @keyframes pulsebar { 0%,100%{opacity:.9} 50%{opacity:.35} }

      /* ── Title glitch ── */
      .glitch { animation: glitch 9s ease-in-out infinite; }
      @keyframes glitch {
        0%,93%,100%{transform:translate(0,0);opacity:1;filter:none}
        94%{transform:translate(-3px,1px);opacity:.8;filter:hue-rotate(90deg)}
        96%{transform:translate(3px,-1px);opacity:.9;filter:hue-rotate(-40deg)}
        97%{transform:translate(0,0);opacity:1;filter:none}
      }

      /* ── Corner brackets ── */
      .corner { animation: cblink 3s ease-in-out infinite; }
      @keyframes cblink { 0%,75%,100%{opacity:1} 80%{opacity:.2} 85%{opacity:1} 88%{opacity:.3} }

      /* ── Pixel ticker ── */
      .px { animation: pixelanim 3.5s linear infinite; }
      .px2 { animation: pixelanim 3.5s linear infinite reverse; }
      @keyframes pixelanim {
        0%{opacity:.15} 30%{opacity:.55} 60%{opacity:.2} 85%{opacity:.6} 100%{opacity:.15}
      }

      /* ── Decorative side bar pulse ── */
      .sidebar { animation: sidepulse 2.8s ease-in-out infinite; }
      @keyframes sidepulse {
        0%,100%{opacity:.8} 50%{opacity:.2}
      }

      /* ── Badge tags ── */
      .tag { opacity: 0; animation: tagfade 0.4s ease forwards; }
      .tag:nth-child(1) { animation-delay: 2.8s; }
      .tag:nth-child(2) { animation-delay: 3.0s; }
      .tag:nth-child(3) { animation-delay: 3.2s; }
      .tag:nth-child(4) { animation-delay: 3.4s; }
      .tag:nth-child(5) { animation-delay: 3.6s; }
      @keyframes tagfade {
        from{opacity:0;transform:translateY(4px)}
        to{opacity:1;transform:translateY(0)}
      }

      /* ── Footer fade ── */
      .footer-text { opacity:0; animation: fadein 0.5s ease 3.8s forwards; }

      /* ── Hex avatar orbit ── */
      .orbit { animation: orbitring 12s linear infinite; transform-origin: 790px 180px; }
      @keyframes orbitring {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      /* ── Hex avatar flicker ── */
      .hexflicker { animation: hexf 6s ease-in-out infinite; }
      @keyframes hexf {
        0%,90%,100%{opacity:1} 92%{opacity:.6} 95%{opacity:1} 97%{opacity:.75} 98%{opacity:1}
      }
    </style>

    <clipPath id="mainclip">
      <rect x="4" y="4" width="852" height="352" rx="10"/>
    </clipPath>

    <!-- Grid pattern -->
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#00ffff" stroke-width="0.2" opacity="0.08"/>
    </pattern>

    <!-- Radial gradient for avatar area -->
    <radialGradient id="avatarglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow filter -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="860" height="360" rx="14" fill="#020c0c"/>
  <rect width="860" height="360" rx="14" fill="url(#grid)"/>

  <!-- Subtle gradient overlay left-side -->
  <rect x="0" y="0" width="430" height="360" rx="14" fill="url(#avatarglow)" opacity="0.3"/>

  <!-- ── Border frames ── -->
  <rect x="2"  y="2"  width="856" height="356" rx="12" fill="none" stroke="#00ffff" stroke-width="1.4" opacity="0.55"/>
  <rect x="6"  y="6"  width="848" height="348" rx="9"  fill="none" stroke="#00ffff" stroke-width="0.35" opacity="0.18"/>

  <!-- ── Corner brackets ── -->
  <g class="corner" fill="#00ffff" filter="url(#glow)">
    <!-- TL -->
    <rect x="10" y="10" width="18" height="2.5"/>
    <rect x="10" y="10" width="2.5" height="18"/>
    <!-- TR -->
    <rect x="832" y="10" width="18" height="2.5"/>
    <rect x="847.5" y="10" width="2.5" height="18"/>
    <!-- BL -->
    <rect x="10" y="347.5" width="18" height="2.5"/>
    <rect x="10" y="332" width="2.5" height="18"/>
    <!-- BR -->
    <rect x="832" y="347.5" width="18" height="2.5"/>
    <rect x="847.5" y="332" width="2.5" height="18"/>
  </g>

  <!-- ── Left accent bar ── -->
  <rect x="0" y="70" width="3" height="220" rx="1.5" fill="#00ffff" class="sidebar"/>
  <rect x="857" y="70" width="3" height="220" rx="1.5" fill="#00ffff" class="sidebar"/>

  <g clip-path="url(#mainclip)">

    <!-- ── TOP PIXEL TICKER ── -->
    <g class="px">
