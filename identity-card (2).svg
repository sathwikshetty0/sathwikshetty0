      <rect x="310" y="23" width="32" height="12" rx="2" fill="#00ffff" opacity="0.3"/>
      <!-- right side -->
      <rect x="520" y="23" width="32" height="12" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="560" y="23" width="32" height="12" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="600" y="23" width="32" height="12" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="640" y="23" width="32" height="12" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="680" y="23" width="32" height="12" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="720" y="23" width="32" height="12" rx="2" fill="#00ffff" opacity="0.3"/>
