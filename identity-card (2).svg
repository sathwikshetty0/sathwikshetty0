      <text x="430" y="36" text-anchor="middle" fill="#00ffff" font-size="12.5" letter-spacing="5" opacity="0.95" font-weight="bold">SYSTEM IDENTITY CARD  //  v3.1.0  //  CLASSIFIED</text>
    </g>

