<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="'Share Tech Mono', 'Courier New', monospace">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

      .scanline {
        animation: scan 3s linear infinite;
      }
      @keyframes scan {
        0% { transform: translateY(0); opacity: 0.04; }
        50% { opacity: 0.08; }
        100% { transform: translateY(320px); opacity: 0.04; }
      }

      .blink {
        animation: blink 1.1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      .row { opacity: 0; animation: fadein 0.4s ease forwards; }
      .row:nth-child(1)  { animation-delay: 0.2s; }
      .row:nth-child(2)  { animation-delay: 0.5s; }
      .row:nth-child(3)  { animation-delay: 0.8s; }
      .row:nth-child(4)  { animation-delay: 1.1s; }
      .row:nth-child(5)  { animation-delay: 1.4s; }
      .row:nth-child(6)  { animation-delay: 1.7s; }
      .row:nth-child(7)  { animation-delay: 2.0s; }

      @keyframes fadein {
        from { opacity: 0; transform: translateX(-6px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      .pulse-bar {
        animation: pulsebar 2s ease-in-out infinite;
      }
      @keyframes pulsebar {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 0.55; }
      }

      .glitch {
        animation: glitch 8s ease-in-out infinite;
      }
      @keyframes glitch {
        0%, 95%, 100% { transform: translate(0,0); opacity: 1; }
        96% { transform: translate(-2px, 1px); opacity: 0.85; }
        97% { transform: translate(2px, -1px); opacity: 0.9; }
        98% { transform: translate(0, 0); opacity: 1; }
      }

      .corner-blink {
        animation: cblink 2.5s ease-in-out infinite;
      }
      @keyframes cblink {
        0%, 80%, 100% { opacity: 1; }
        90% { opacity: 0.3; }
      }

      .pixel-row {
        animation: pixelanim 4s linear infinite;
      }
      @keyframes pixelanim {
        0% { opacity: 0.25; }
        25% { opacity: 0.6; }
        50% { opacity: 0.3; }
        75% { opacity: 0.7; }
        100% { opacity: 0.25; }
      }
      .pixel-row:nth-child(2) { animation-delay: 0.5s; }
      .pixel-row:nth-child(3) { animation-delay: 1s; }
      .pixel-row:nth-child(4) { animation-delay: 1.5s; }
    </style>

    <!-- Scanline rect for CRT effect -->
    <clipPath id="cardclip">
      <rect x="4" y="4" width="792" height="312" rx="10"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect x="0" y="0" width="800" height="320" rx="12" fill="#030d0d"/>
  <rect x="2" y="2" width="796" height="316" rx="11" fill="none" stroke="#00ffff" stroke-width="1.2" opacity="0.5"/>
  <rect x="5" y="5" width="790" height="310" rx="9" fill="none" stroke="#00ffff" stroke-width="0.4" opacity="0.2"/>

  <!-- Corner decorators -->
  <g class="corner-blink" fill="#00ffff" opacity="0.9">
    <rect x="8"   y="8"   width="14" height="2"/>
    <rect x="8"   y="8"   width="2"  height="14"/>
    <rect x="778" y="8"   width="14" height="2"/>
    <rect x="790" y="8"   width="2"  height="14"/>
    <rect x="8"   y="310" width="14" height="2"/>
    <rect x="8"   y="298" width="2"  height="14"/>
    <rect x="778" y="310" width="14" height="2"/>
    <rect x="790" y="298" width="2"  height="14"/>
  </g>

  <!-- Pixel decorative rows (top) -->
  <g clip-path="url(#cardclip)">
    <g class="pixel-row">
      <rect x="28"  y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="64"  y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="100" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="136" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="172" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="208" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="244" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="280" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
    </g>
    <g class="pixel-row">
      <rect x="492" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="528" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="564" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="600" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="636" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="672" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="708" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="744" y="22" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
    </g>

    <!-- Title -->
    <g class="glitch">
      <text x="400" y="34" text-anchor="middle" fill="#00ffff" font-size="13" font-family="'Share Tech Mono', monospace" letter-spacing="4" opacity="0.9">SYSTEM IDENTITY // v2.6.0</text>
    </g>

    <!-- Pixel decorative rows (second) -->
    <g class="pixel-row">
      <rect x="28"  y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="64"  y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="100" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="136" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="172" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="208" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="244" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="280" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
    </g>
    <g class="pixel-row">
      <rect x="492" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="528" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="564" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="600" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="636" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="672" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="708" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
      <rect x="744" y="44" width="28" height="11" rx="2" fill="#00ffff" opacity="0.3"/>
    </g>

    <!-- Divider -->
    <line x1="28" y1="62" x2="772" y2="62" stroke="#00ffff" stroke-width="0.5" opacity="0.3"/>

    <!-- Data rows -->
    <g>
      <g class="row">
        <text x="48"  y="86" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">NAME</text>
        <text x="180" y="86" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">──▶</text>
        <text x="240" y="86" fill="#e0fffe" font-size="12.5" font-family="'Share Tech Mono',monospace">Sathwik Shetty</text>
      </g>
      <g class="row">
        <text x="48"  y="108" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">ROLE</text>
        <text x="180" y="108" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">──▶</text>
        <text x="240" y="108" fill="#e0fffe" font-size="12.5" font-family="'Share Tech Mono',monospace">CS Engineer · Product Dev · Mentor</text>
      </g>
      <g class="row">
        <text x="48"  y="130" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">LOCATION</text>
        <text x="180" y="130" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">──▶</text>
        <text x="240" y="130" fill="#e0fffe" font-size="12.5" font-family="'Share Tech Mono',monospace">Mangaluru, Karnataka 🇮🇳</text>
      </g>
      <g class="row">
        <text x="48"  y="152" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">INSTITUTION</text>
        <text x="180" y="152" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">──▶</text>
        <text x="240" y="152" fill="#e0fffe" font-size="12.5" font-family="'Share Tech Mono',monospace">Sahyadri College of Engineering &amp; Mgmt</text>
      </g>
      <g class="row">
        <text x="48"  y="174" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">STATUS</text>
        <text x="180" y="174" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">──▶</text>
        <!-- Animated progress bar -->
        <rect x="240" y="162" width="160" height="16" rx="2" fill="#00ffff" class="pulse-bar" opacity="0.85"/>
        <text x="408" y="174" fill="#00ff88" font-size="12.5" font-family="'Share Tech Mono',monospace"> ONLINE — Building ∞</text>
      </g>
      <g class="row">
        <text x="48"  y="196" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">CORE STACK</text>
        <text x="180" y="196" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">──▶</text>
        <text x="240" y="196" fill="#e0fffe" font-size="12.5" font-family="'Share Tech Mono',monospace">AI · RAG · OpenCV · IoT · ROS · Full-Stack</text>
      </g>
      <g class="row">
        <text x="48"  y="218" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">MISSION</text>
        <text x="180" y="218" fill="#00ffff" opacity="0.6" font-size="12.5" font-family="'Share Tech Mono',monospace">──▶</text>
        <text x="240" y="218" fill="#e0fffe" font-size="12.5" font-family="'Share Tech Mono',monospace">Merge AI × Hardware × Software for real impact</text>
      </g>
    </g>

    <!-- Bottom divider -->
    <line x1="28" y1="236" x2="772" y2="236" stroke="#00ffff" stroke-width="0.5" opacity="0.3"/>

    <!-- Pixel rows (bottom) -->
    <g class="pixel-row">
      <rect x="28"  y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="64"  y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="100" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="136" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="172" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="208" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="244" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="280" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="492" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="528" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="564" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="600" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="636" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="672" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="708" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
      <rect x="744" y="247" width="28" height="11" rx="2" fill="#00ffff" opacity="0.25"/>
    </g>

    <!-- System log line at bottom -->
    <text x="48" y="287" fill="#00ffff" opacity="0.4" font-size="11" font-family="'Share Tech Mono',monospace">[ SYS ] ALL SYSTEMS NOMINAL · UPTIME: ∞ · NEXT BUILD: LOADING</text>
    <text class="blink" x="640" y="287" fill="#00ffff" opacity="0.7" font-size="11" font-family="'Share Tech Mono',monospace">█</text>

    <!-- CRT scanline sweep -->
    <rect class="scanline" x="4" y="4" width="792" height="6" fill="#00ffff" opacity="0.04" clip-path="url(#cardclip)"/>
  </g>
</svg>
