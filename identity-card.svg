<svg width="860" height="310" viewBox="0 0 860 310"
xmlns="http://www.w3.org/2000/svg"
font-family="'Courier New', Courier, monospace">

<defs>

<style>
/* === SCANLINE === */
.scanline { animation: scan 3s linear infinite; }
@keyframes scan {
  0% { transform: translateY(-10px); opacity: 0; }
  10% { opacity: 0.08; }
  90% { opacity: 0.05; }
  100% { transform: translateY(320px); opacity: 0; }
}

/* === BLINK === */
.blink { animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* === ROW FADE === */
.row { opacity: 0; animation: fadein 0.5s ease forwards; }
.row:nth-child(1){animation-delay:0.3s}
.row:nth-child(2){animation-delay:0.6s}
.row:nth-child(3){animation-delay:0.9s}
.row:nth-child(4){animation-delay:1.2s}

@keyframes fadein {
  from{opacity:0;transform:translateX(-10px)}
  to{opacity:1;transform:translateX(0)}
}

/* === GLOW === */
.nameglow {
  filter: drop-shadow(0 0 6px #00ffffaa);
  animation: ng 3s ease-in-out infinite;
}
@keyframes ng {
  0%,100%{filter:drop-shadow(0 0 5px #00ffff88)}
  50%{filter:drop-shadow(0 0 14px #00ffff)}
}

/* === TAG HOVER === */
.tag:hover rect {
  fill-opacity:0.25;
  stroke-opacity:1;
  transform:scale(1.05);
}
.tag:hover text {
  filter:drop-shadow(0 0 6px #00ffff);
}

/* === FLICKER === */
.flicker { animation: flick 6s infinite; }
@keyframes flick {
  0%,97%,100%{opacity:1}
  98%{opacity:0.4}
  99%{opacity:0.7}
}

/* === SIDEBAR === */
.sidebar { animation: sp 3s ease-in-out infinite; }
@keyframes sp { 0%,100%{opacity:.8} 50%{opacity:.2} }

</style>

<!-- GRID -->
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
  <path d="M 40 0 L 0 0 0 40"
        fill="none"
        stroke="#00ffff"
        stroke-width="0.2"
        opacity="0.06"/>
</pattern>

<!-- NOISE -->
<filter id="noise">
  <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2"/>
  <feColorMatrix type="saturate" values="0"/>
  <feComponentTransfer>
    <feFuncA type="table" tableValues="0 0 0.03 0"/>
  </feComponentTransfer>
</filter>

<!-- ENERGY LINE -->
<linearGradient id="energy">
  <stop offset="0%" stop-color="#00ffff" stop-opacity="0"/>
  <stop offset="50%" stop-color="#00ffff"/>
  <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
</linearGradient>

</defs>

<!-- BACKGROUND -->
<rect width="860" height="310" rx="14" fill="#020c0c"/>
<rect width="860" height="310" fill="url(#grid)"/>
<rect width="860" height="310" filter="url(#noise)" opacity="0.4"/>

<!-- BORDER -->
<rect x="3" y="3" width="854" height="304" rx="12"
stroke="#00ffff" fill="none" opacity="0.5"/>

<!-- SIDEBARS -->
<rect x="0" y="60" width="3" height="180" fill="#00ffff" class="sidebar"/>
<rect x="857" y="60" width="3" height="180" fill="#00ffff" class="sidebar"/>

<!-- TITLE -->
<text x="430" y="32" text-anchor="middle"
fill="#00ffff"
font-size="13"
letter-spacing="6"
class="flicker">
SYSTEM IDENTITY CARD // v4.0
</text>

<!-- ENERGY DIVIDER -->
<line x1="28" y1="60" x2="832" y2="60"
stroke="url(#energy)" stroke-width="1.2">
<animate attributeName="stroke-dasharray"
values="0,840;200,640;0,840"
dur="2.5s"
repeatCount="indefinite"/>
</line>

<!-- DATA -->
<g class="row">
<text x="46" y="100" fill="#00ffff" opacity="0.6">NAME</text>
<text x="240" y="100" class="nameglow" fill="#e0ffff">Sathwik Shetty</text>
</g>

<g class="row">
<text x="46" y="125" fill="#00ffff" opacity="0.6">ROLE</text>
<text x="240" y="125" fill="#e0ffff">Product Developer · AI Builder · IoT </text>
</g>

<g class="row">
<text x="46" y="150" fill="#00ffff" opacity="0.6">STATUS</text>

<rect x="240" y="138" width="140" height="14" rx="3"
fill="url(#energy)">
<animate attributeName="x"
values="240;255;240"
dur="2s"
repeatCount="indefinite"/>
</rect>

<text x="390" y="150" fill="#00ff88">◉ ONLINE</text>
</g>

<g class="row">
<text x="46" y="175" fill="#00ffff" opacity="0.6">STACK</text>
<text x="240" y="175" fill="#e0ffff">AI · RAG · OpenCV · ROS · IoT · Web Dev</text>
</g>

<!-- TAGS -->
<g class="tag">
<rect x="46" y="210" width="80" height="20" rx="3"
fill="#00ffff" opacity="0.1"
stroke="#00ffff"/>
<text x="86" y="224" text-anchor="middle"
fill="#00ffff">LangChain</text>
</g>

<g class="tag">
<rect x="140" y="210" width="70" height="20" rx="3"
fill="#ff6e96" opacity="0.1"
stroke="#ff6e96"/>
<text x="175" y="224" text-anchor="middle"
fill="#ff6e96">ROS</text>
</g>

<g class="tag">
<rect x="140" y="210" width="70" height="20" rx="3"
fill="#ff6e96" opacity="0.1"
stroke="#ff6e96"/>
<text x="175" y="224" text-anchor="middle"
fill="#ff6e96">IOT</text>
</g>

<g class="tag">
<rect x="140" y="210" width="70" height="20" rx="3"
fill="#ff6e96" opacity="0.1"
stroke="#ff6e96"/>
<text x="175" y="224" text-anchor="middle"
fill="#ff6e96">Ollama</text>
</g>

<!-- SYSTEM DOT -->
<circle cx="820" cy="20" r="2" fill="#00ff88">
<animate attributeName="opacity"
values="1;0.2;1"
dur="1s"
repeatCount="indefinite"/>
</circle>

<!-- FOOTER -->
<text x="430" y="270" text-anchor="middle"
fill="#00ffff"
opacity="0.3"
font-size="10"
class="flicker">
SYSTEM ACTIVE · UPTIME ∞
</text>

<text x="740" y="270" class="blink" fill="#00ffff">█</text>

<!-- SCANLINES -->
<rect class="scanline" width="860" height="3"
fill="#00ffff" opacity="0.08"/>

</svg>
