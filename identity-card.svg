        <text x="240" y="100" fill="#e0ffff" font-size="14"  font-weight="bold" letter-spacing="1.2" class="nameglow">Sathwik Shetty</text>

        <text x="450" y="100" fill="#00ffff" opacity="0.5"  font-size="11.5" letter-spacing="1">INSTITUTION</text>
        <text x="590" y="100" fill="#00ffff" opacity="0.32" font-size="11.5">──▶</text>
        <text x="644" y="100" fill="#e0ffff" font-size="11.5">Sahyadri College, Mangaluru</text>
      </g>

      <!-- Row 2: ROLE | LOCATION -->
      <g class="row">
        <text x="46"  y="124" fill="#00ffff" opacity="0.5"  font-size="11.5" letter-spacing="1">ROLE</text>
        <text x="186" y="124" fill="#00ffff" opacity="0.32" font-size="11.5">──▶</text>
        <text x="240" y="124" fill="#e0ffff" font-size="11.5">CS Engineer  ·  Product Dev  ·  Mentor</text>

        <text x="450" y="124" fill="#00ffff" opacity="0.5"  font-size="11.5" letter-spacing="1">LOCATION</text>
        <text x="590" y="124" fill="#00ffff" opacity="0.32" font-size="11.5">──▶</text>
        <text x="644" y="124" fill="#e0ffff" font-size="11.5">Karnataka, India 🇮🇳</text>
      </g>

      <!-- Row 3: STATUS | FUNDING -->
      <g class="row">
        <text x="46"  y="148" fill="#00ffff" opacity="0.5"  font-size="11.5" letter-spacing="1">STATUS</text>
        <text x="186" y="148" fill="#00ffff" opacity="0.32" font-size="11.5">──▶</text>
        <rect x="240" y="136" width="148" height="16" rx="3" fill="#00ffff" class="pulse-bar" opacity="0.8"/>
        <text x="396" y="148" fill="#00ff88" font-size="11.5" font-weight="bold">  ◉ ONLINE &amp; BUILDING</text>

        <text x="450" y="148" fill="#00ffff" opacity="0.5"  font-size="11.5" letter-spacing="1">FUNDING</text>
        <text x="590" y="148" fill="#00ffff" opacity="0.32" font-size="11.5">──▶</text>
        <text x="644" y="148" fill="#ff6e96" font-size="11.5" font-weight="bold">₹16.5L MSME · AeroWave 🛵</text>
      </g>

      <!-- Row 4: CORE STACK | MISSION -->
      <g class="row">
        <text x="46"  y="172" fill="#00ffff" opacity="0.5"  font-size="11.5" letter-spacing="1">CORE STACK</text>
        <text x="186" y="172" fill="#00ffff" opacity="0.32" font-size="11.5">──▶</text>
        <text x="240" y="172" fill="#e0ffff" font-size="11.5">AI · RAG · OpenCV · IoT · ROS · Full-Stack</text>

        <text x="450" y="172" fill="#00ffff" opacity="0.5"  font-size="11.5" letter-spacing="1">MISSION</text>
        <text x="590" y="172" fill="#00ffff" opacity="0.32" font-size="11.5">──▶</text>
        <text x="644" y="172" fill="#e0ffff" font-size="11.5">AI × HW × SW for impact</text>
      </g>
    </g>

    <!-- MID DIVIDER -->
    <line x1="28" y1="190" x2="832" y2="190" stroke="#00ffff" stroke-width="0.5" opacity="0.25"/>

    <!-- SKILL TAGS -->
