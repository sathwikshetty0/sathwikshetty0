<svg width="860" height="310" viewBox="0 0 860 310" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <defs>
    <style>
      .scanline { animation: scan 4s linear infinite; }
      @keyframes scan {
        0%   { transform: translateY(-10px); opacity: 0; }
        5%   { opacity: 0.06; }
        95%  { opacity: 0.04; }
        100% { transform: translateY(320px); opacity: 0; }
      }
      .blink { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      .row { opacity: 0; animation: fadein 0.45s ease forwards; }
      .row:nth-child(1){animation-delay:0.25s}
      .row:nth-child(2){animation-delay:0.55s}
      .row:nth-child(3){animation-delay:0.85s}
      .row:nth-child(4){animation-delay:1.15s}
      @keyframes fadein {
        from{opacity:0;transform:translateX(-10px)}
        to{opacity:1;transform:translateX(0)}
      }

      .pulse-bar { animation: pb 2s ease-in-out infinite; }
      @keyframes pb { 0%,100%{opacity:.9} 50%{opacity:.3} }

      .glitch { animation: glitch 10s ease-in-out infinite; }
      @keyframes glitch {
        0%,92%,100%{transform:translate(0,0);opacity:1;filter:none}
        93%{transform:translate(-3px,1px);opacity:.75;filter:hue-rotate(80deg)}
        95%{transform:translate(3px,-1px);opacity:.88;filter:hue-rotate(-50deg)}
        96%{transform:translate(0,0);opacity:1;filter:none}
      }

      .corner { animation: cblink 3.5s ease-in-out infinite; }
      @keyframes cblink { 0%,78%,100%{opacity:1} 82%{opacity:.15} 86%{opacity:1} 90%{opacity:.25} }

      .px  { animation: pa 3.5s linear infinite; }
      .px2 { animation: pa 3.5s linear infinite reverse; }
      @keyframes pa { 0%{opacity:.12} 35%{opacity:.5} 65%{opacity:.18} 85%{opacity:.55} 100%{opacity:.12} }

      .sidebar { animation: sp 3s ease-in-out infinite; }
      @keyframes sp { 0%,100%{opacity:.85} 50%{opacity:.2} }

      .tag{opacity:0;animation:tf 0.4s ease forwards}
      .tag:nth-child(1){animation-delay:1.6s}
      .tag:nth-child(2){animation-delay:1.8s}
      .tag:nth-child(3){animation-delay:2.0s}
      .tag:nth-child(4){animation-delay:2.2s}
      .tag:nth-child(5){animation-delay:2.4s}
      .tag:nth-child(6){animation-delay:2.6s}
      @keyframes tf{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

      .ftxt{opacity:0;animation:fadein 0.5s ease 2.8s forwards}

      .nameglow{animation:ng 3s ease-in-out infinite}
      @keyframes ng{0%,100%{filter:drop-shadow(0 0 4px #00ffff88)}50%{filter:drop-shadow(0 0 12px #00ffffcc)}}

      .drawline{stroke-dasharray:840;stroke-dashoffset:840;animation:draw 1s ease 0.1s forwards}
      @keyframes draw{to{stroke-dashoffset:0}}
    </style>

    <clipPath id="mc">
      <rect x="4" y="4" width="852" height="302" rx="10"/>
    </clipPath>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ffff" stroke-width="0.18" opacity="0.07"/>
    </pattern>

    <linearGradient id="leftglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00ffff" stop-opacity="0.06"/>
      <stop offset="60%"  stop-color="#00ffff" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="titlegrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00ffff"/>
      <stop offset="50%"  stop-color="#b0ffff"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="860" height="310" rx="14" fill="#020c0c"/>
  <rect width="860" height="310" rx="14" fill="url(#grid)"/>
  <rect width="860" height="310" rx="14" fill="url(#leftglow)"/>

  <!-- Border -->
  <rect x="2"  y="2"  width="856" height="306" rx="12" fill="none" stroke="#00ffff" stroke-width="1.4" opacity="0.55"/>
  <rect x="6"  y="6"  width="848" height="298" rx="9"  fill="none" stroke="#00ffff" stroke-width="0.35" opacity="0.16"/>

  <!-- Corner brackets -->
  <g class="corner" fill="#00ffff" filter="url(#glow)">
    <rect x="10" y="10" width="20" height="2.5"/>
    <rect x="10" y="10" width="2.5" height="20"/>
    <rect x="830" y="10" width="20" height="2.5"/>
    <rect x="847.5" y="10" width="2.5" height="20"/>
    <rect x="10"  y="297.5" width="20" height="2.5"/>
    <rect x="10"  y="280"   width="2.5" height="20"/>
    <rect x="830" y="297.5" width="20" height="2.5"/>
    <rect x="847.5" y="280" width="2.5" height="20"/>
  </g>

  <!-- Side bars -->
  <rect x="0"   y="65" width="3" height="182" rx="1.5" fill="#00ffff" class="sidebar"/>
  <rect x="857" y="65" width="3" height="182" rx="1.5" fill="#00ffff" class="sidebar"/>

  <g clip-path="url(#mc)">

    <!-- TOP PIXEL TICKER -->
    <g class="px">
      <rect x="30"  y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="68"  y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="106" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="144" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
