    <!-- SECTION LABEL -->
    <text x="46" y="78" fill="#00ffff" opacity="0.28" font-size="10" letter-spacing="3">[ IDENTITY RECORD ]</text>

    <!-- VERTICAL CENTER DIVIDER -->
