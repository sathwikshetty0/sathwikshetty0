      <rect x="220" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="258" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="296" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="496" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="534" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="572" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="610" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="648" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="686" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="724" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="762" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
      <rect x="800" y="19" width="30" height="11" rx="2" fill="#00ffff" opacity="0.28"/>
    </g>

    <!-- TITLE -->
    <g class="glitch">
      <text x="430" y="31" text-anchor="middle" fill="url(#titlegrad)" font-size="11.5" letter-spacing="5" opacity="0.95" font-weight="bold">SYSTEM IDENTITY CARD  //  v3.1.0  //  CLASSIFIED</text>
    </g>

    <!-- TICKER ROW 2 -->
    <g class="px2">
      <rect x="30"  y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
      <rect x="68"  y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
      <rect x="106" y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
      <rect x="144" y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
      <rect x="182" y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
      <rect x="220" y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
      <rect x="258" y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
      <rect x="296" y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
      <rect x="496" y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
      <rect x="534" y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
      <rect x="572" y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
      <rect x="610" y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
      <rect x="648" y="39" width="30" height="11" rx="2" fill="#00ffff" opacity="0.18"/>
