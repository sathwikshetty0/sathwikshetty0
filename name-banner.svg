<svg width="900" height="180" viewBox="0 0 900 180"
xmlns="http://www.w3.org/2000/svg">

<defs>

<style>

/* === BACKGROUND GRID === */
.grid {
  fill: none;
  stroke: #00ffff;
  stroke-width: 0.2;
  opacity: 0.08;
}

/* === GLOW TEXT === */
.name {
  font-family: 'Courier New', monospace;
  font-size: 58px;
  letter-spacing: 6px;
  fill: #00ffff;
  filter: drop-shadow(0 0 6px #00ffffaa);
  animation: glow 3s ease-in-out infinite;
}

@keyframes glow {
  0%,100% { filter: drop-shadow(0 0 6px #00ffffaa); }
  50% { filter: drop-shadow(0 0 20px #00ffff); }
}

/* === GLITCH === */
.glitch {
  animation: glitch 6s infinite;
}

@keyframes glitch {
  0%, 95%, 100% { transform: translate(0,0); }
  96% { transform: translate(-2px,1px); }
  97% { transform: translate(2px,-1px); }
  98% { transform: translate(-1px,0); }
}

/* === SCANLINE === */
.scanline {
  animation: scan 3s linear infinite;
}

@keyframes scan {
  0% { transform: translateY(-10px); opacity: 0; }
  10% { opacity: 0.1; }
  90% { opacity: 0.05; }
  100% { transform: translateY(200px); opacity: 0; }
}

/* === ENERGY LINE === */
.energy {
  stroke: url(#grad);
  stroke-width: 2;
  stroke-dasharray: 200,700;
  animation: dash 3s linear infinite;
}

@keyframes dash {
  to { stroke-dashoffset: -900; }
}

/* === FLICKER === */
.flicker {
  animation: flick 5s infinite;
}

@keyframes flick {
  0%, 97%, 100% { opacity: 1; }
  98% { opacity: 0.4; }
  99% { opacity: 0.7; }
}

/* === PULSE DOT === */
.dot {
  fill: #00ff88;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.2; }
}

</style>

<!-- GRID PATTERN -->
<pattern id="p" width="40" height="40" patternUnits="userSpaceOnUse">
  <path d="M 40 0 L 0 0 0 40" class="grid"/>
</pattern>

<!-- GRADIENT -->
<linearGradient id="grad">
  <stop offset="0%" stop-color="#00ffff" stop-opacity="0"/>
  <stop offset="50%" stop-color="#00ffff"/>
  <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
</linearGradient>

</defs>

<!-- BACKGROUND -->
<rect width="900" height="180" fill="#020c0c"/>
<rect width="900" height="180" fill="url(#p)"/>

<!-- BORDER -->
<rect x="5" y="5" width="890" height="170"
fill="none" stroke="#00ffff" opacity="0.5"/>

<!-- ENERGY LINES -->
<line x1="40" y1="40" x2="860" y2="40" class="energy"/>
<line x1="40" y1="140" x2="860" y2="140" class="energy"/>

<!-- NAME -->
<g class="glitch">
<text x="450" y="100" text-anchor="middle" class="name flicker">
SATHWIK SHETTY
</text>
</g>

<!-- SUBTITLE -->
<text x="450" y="130" text-anchor="middle"
fill="#a0f0f0"
font-size="14"
letter-spacing="3"
class="flicker">
ENGINEER · BUILDER · INNOVATOR
</text>

<!-- STATUS DOT -->
<circle cx="820" cy="25" r="3" class="dot"/>

<!-- SCANLINE -->
<rect width="900" height="4" fill="#00ffff"
opacity="0.1"
class="scanline"/>

</svg>
