<svg width="900" height="180" viewBox="0 0 900 180"
xmlns="http://www.w3.org/2000/svg">

<defs>

<style>

/* === BASE COLORS === */
:root {
  --primary: #00ffff;
  --bg: #021010;
}

/* === GRID === */
.grid {
  fill: none;
  stroke: var(--primary);
  stroke-width: 0.2;
  opacity: 0.06;
}

/* === TEXT === */
.name {
  font-family: 'Courier New', monospace;
  font-size: 58px;
  letter-spacing: 6px;
  fill: var(--primary);
  filter: url(#glow);
  animation: floatText 6s ease-in-out infinite;
}

@keyframes floatText {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(0,-2px); }
}

/* === ENERGY LINE === */
.energy {
  stroke: var(--primary);
  stroke-width: 2;
  fill: none;
  filter: url(#glow);
}

/* === PARTICLES === */
.p {
  fill: var(--primary);
  opacity: 0.5;
  animation: drift 8s infinite linear;
}

@keyframes drift {
  0% { transform: translate(0,0); opacity: 0; }
  20% { opacity: 0.6; }
  100% { transform: translate(0,-60px); opacity: 0; }
}

/* === DOT === */
.dot {
  fill: #00ffaa;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* === SCANLINE === */
.scan {
  animation: scan 3s linear infinite;
}

@keyframes scan {
  from { transform: translateY(-10px); }
  to { transform: translateY(200px); }
}

</style>

<!-- GRID -->
<pattern id="p" width="40" height="40" patternUnits="userSpaceOnUse">
  <path d="M 40 0 L 0 0 0 40" class="grid"/>
</pattern>

<!-- GLOW FILTER -->
<filter id="glow">
  <feGaussianBlur stdDeviation="2" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<!-- LIQUID DISTORTION -->
<filter id="liquid">
  <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="2" seed="2">
    <animate attributeName="baseFrequency" values="0.01;0.02;0.01" dur="6s" repeatCount="indefinite"/>
  </feTurbulence>
  <feDisplacementMap in="SourceGraphic" scale="8"/>
</filter>

</defs>

<!-- BACKGROUND -->
<rect width="900" height="180" fill="var(--bg)"/>
<rect width="900" height="180" fill="url(#p)"/>

<!-- ENERGY WAVES (PHYSICS FEEL) -->
<path d="M40 40 Q200 60 350 40 T650 40 T860 40"
class="energy" filter="url(#liquid)">
  <animate attributeName="d"
    dur="4s"
    repeatCount="indefinite"
    values="
    M40 40 Q200 60 350 40 T650 40 T860 40;
    M40 40 Q200 20 350 40 T650 60 T860 40;
    M40 40 Q200 60 350 40 T650 40 T860 40"/>
</path>

<path d="M40 140 Q200 120 350 140 T650 140 T860 140"
class="energy" filter="url(#liquid)">
  <animate attributeName="d"
    dur="4s"
    repeatCount="indefinite"
    values="
    M40 140 Q200 120 350 140 T650 140 T860 140;
    M40 140 Q200 160 350 140 T650 120 T860 140;
    M40 140 Q200 120 350 140 T650 140 T860 140"/>
</path>

<!-- NAME -->
<text x="450" y="100" text-anchor="middle"
class="name">
SATHWIK SHETTY
</text>

<!-- SUBTITLE -->
<text x="450" y="130" text-anchor="middle"
fill="#88dddd"
font-size="14"
letter-spacing="3">
ENGINEER · BUILDER · INNOVATOR
</text>

<!-- PARTICLES -->
<circle cx="200" cy="150" r="2" class="p"/>
<circle cx="600" cy="160" r="2" class="p"/>
<circle cx="750" cy="140" r="2" class="p"/>
<circle cx="400" cy="170" r="2" class="p"/>

<!-- STATUS DOT -->
<circle cx="820" cy="25" r="3" class="dot"/>

<!-- SCANLINE -->
<rect width="900" height="3" fill="#00ffff22" class="scan"/>

</svg>
